<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PyClaw">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script async src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" onerror="this.remove()"></script>
<title>PyClaw</title>
<style>
:root{--bg:#080b16;--bg2:rgba(18,22,40,.7);--bg3:rgba(99,102,241,.08);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--gold:#f59e0b;--red:#ef4444;--border:rgba(99,102,241,.06);--radius:14px;--radius-sm:10px;--header-h:52px;--bg-sidebar:rgba(8,11,24,.92);--bg-sidebar-head:rgba(99,102,241,.05)}
[data-theme="light"]{--bg:#f5f6fa;--bg2:rgba(255,255,255,.82);--bg3:rgba(0,0,0,.04);--text:#1a1a2e;--text2:#4a5568;--text3:#718096;--border:rgba(0,0,0,.06);--accent:#4f46e5;--accent2:#6366f1;--bg-sidebar:rgba(255,255,255,.92);--bg-sidebar-head:rgba(79,70,229,.04)}
*,*::after,*::before{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);background:var(--bg);width:100%;height:100%;overflow:hidden;display:flex}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(99,102,241,.1),transparent 55%),radial-gradient(ellipse 60% 70% at 80% 60%,rgba(139,92,246,.08),transparent 55%),radial-gradient(ellipse 50% 50% at 50% 85%,rgba(16,185,129,.08),transparent 55%),linear-gradient(180deg,#080b16 0%,#0f1335 35%,#0d0f2e 65%,#080b16 100%);animation:bgBreath 18s ease-in-out infinite}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(2px 2px at 12% 22%,rgba(99,102,241,.45),transparent),radial-gradient(2px 2px at 48% 14%,rgba(139,92,246,.35),transparent),radial-gradient(1px 1px at 72% 32%,rgba(16,185,129,.4),transparent),radial-gradient(2px 2px at 28% 62%,rgba(99,102,241,.3),transparent);background-size:220% 220%;animation:starsFloat 24s linear infinite;opacity:.5}
@keyframes bgBreath{0%,100%{opacity:1}50%{opacity:.8}}@keyframes starsFloat{0%{background-position:0 0}100%{background-position:100% 100%}}
[data-theme="light"] body::before{background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(79,70,229,.04),#f5f6fa 55%),radial-gradient(ellipse 60% 70% at 80% 60%,rgba(139,92,246,.03),#f5f6fa 55%),radial-gradient(ellipse 50% 50% at 50% 85%,rgba(16,185,129,.03),transparent 55%),linear-gradient(180deg,#f5f6fa 0%,#eef0f6 50%,#f5f6fa 100%)}
[data-theme="light"] body::after{opacity:.15}
[data-theme="light"] .sidebar-head{color:#4f46e5}
[data-theme="light"] .ses-item{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.04)}
[data-theme="light"] .ses-item.current{background:linear-gradient(135deg,rgba(79,70,229,.06),rgba(99,102,246,.03))}
[data-theme="light"] .avatar.user{background:linear-gradient(135deg,#4f46e5,#6366f1)}
[data-theme="light"] .header{background:rgba(255,255,255,.75)}
[data-theme="light"] .input-area{background:rgba(255,255,255,.7)}
[data-theme="light"] #input{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.08);color:var(--text)}
[data-theme="light"] .card{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.04)}
[data-theme="light"] .welcome h2{background:linear-gradient(135deg,#4f46e5,#6366f1,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
[data-theme="light"] .msg{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.04)}
[data-theme="light"] .msg.user{background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(99,102,246,.02))}
[data-theme="light"] .msg:not(.user){background:linear-gradient(135deg,rgba(16,185,129,.04),rgba(5,150,105,.02))}
[data-theme="light"] .msg pre{background:#f1f3f5;border-color:rgba(0,0,0,.06)}
[data-theme="light"] .example{background:rgba(255,255,255,.6)}
[data-theme="light"] .icon-btn{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.06)}
.sidebar{position:relative;z-index:2;width:268px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;z-index:100;transition:transform .35s;backdrop-filter:blur(32px)}
.sidebar-head{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:800;font-size:17px;color:var(--text-accent,#a5b4fc);background:linear-gradient(180deg,var(--bg-sidebar-head),transparent)}
.close-btn{display:none;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:6px 10px;border-radius:8px;transition:.2s}.close-btn:hover{background:rgba(99,102,241,.12);color:var(--text)}
.nav-tabs{display:flex;padding:6px 10px;gap:4px}
.nav-tab{flex:1;text-align:center;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:700;color:var(--text3);transition:.2s}
.nav-tab:hover{color:var(--text2);background:rgba(99,102,241,.06)}.nav-tab.active{background:rgba(99,102,241,.1);color:#a5b4fc;box-shadow:inset 0 0 0 1px rgba(99,102,241,.1)}
.sidebar-content{flex:1;overflow-y:auto;padding:6px 12px 16px}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:16px 4px 8px}
.ses-item{padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;position:relative;font-size:13px;transition:.25s;border:1px solid rgba(99,102,241,.04);margin-bottom:4px;background:rgba(15,20,40,.35);backdrop-filter:blur(8px)}
.ses-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.03),rgba(139,92,246,.01));opacity:0;transition:.3s}
.ses-item:hover{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.15);transform:translateX(4px);box-shadow:0 4px 16px rgba(99,102,241,.06)}.ses-item:hover::before{opacity:1}
.ses-item.current{border-color:rgba(99,102,241,.2);background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.04));border-left:3px solid var(--accent2);box-shadow:0 0 20px rgba(99,102,241,.08)}
.ses-name{display:block;font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:34px}
.ses-meta{display:flex;gap:8px;align-items:center;margin-top:3px;font-size:11px;color:var(--text3)}
.ses-badge{font-size:10px;font-weight:800;color:#34d399;padding:2px 6px;background:rgba(16,185,129,.1);border-radius:4px}
.ses-menu{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.1);color:var(--text3);cursor:pointer;padding:3px 8px;border-radius:6px;font-size:14px;z-index:2;transition:.2s;opacity:.4}.ses-item:hover .ses-menu{opacity:1}.ses-menu:hover{background:rgba(99,102,241,.18);color:var(--accent2);opacity:1}
.tool-item{padding:6px 10px;border-radius:6px;color:var(--text3);font-size:12px;display:flex;align-items:center;gap:8px;transition:.2s}.tool-item:hover{color:var(--text2);background:rgba(99,102,241,.03)}
.ses-dropdown{display:none;position:fixed;background:rgba(18,22,40,.98);border:1px solid rgba(99,102,241,.15);border-radius:var(--radius-sm);padding:4px;min-width:120px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.5);backdrop-filter:blur(16px)}.ses-dropdown.show{display:block}
.ses-dropdown button{display:block;width:100%;padding:8px 14px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;text-align:left;border-radius:6px;transition:.15s}.ses-dropdown button:hover{background:rgba(99,102,241,.1);color:var(--text)}.ses-dropdown button.danger:hover{background:rgba(239,68,68,.1);color:var(--red)}
.main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
.header{display:flex;align-items:center;height:var(--header-h);padding:0 20px;border-bottom:1px solid rgba(99,102,241,.05);gap:12px;flex-shrink:0;background:rgba(8,11,24,.7);backdrop-filter:blur(24px)}
.header::after{content:'';position:absolute;bottom:-1px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.2),rgba(139,92,246,.2),transparent)}
.header-title{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;color:var(--text);flex:1;min-width:0}
.hamburger{display:none;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:6px;border-radius:8px;transition:.2s}.hamburger:hover{background:rgba(99,102,241,.08)}
.controls{display:flex;gap:8px;align-items:center;flex-shrink:0}
.input-tools{display:flex;align-items:center;gap:6px;max-width:860px;margin:0 auto 8px;padding:0 2px}
.input-tools .seg{border-color:rgba(99,102,241,.08)}
.input-tools .seg-btn{padding:4px 10px;font-size:11px}
.input-tools .think-btn{padding:4px 10px;font-size:11px}
.seg{display:flex;background:rgba(8,11,24,.4);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);overflow:hidden;backdrop-filter:blur(8px)}
.seg-btn{padding:7px 14px;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:.25s}.seg-btn.active{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 2px 14px rgba(99,102,241,.3)}.seg-btn:hover:not(.active){color:var(--text2)}
.think-btn{padding:7px 12px;font-size:12px;font-weight:700;border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);background:rgba(8,11,24,.3);color:var(--text3);cursor:pointer;transition:.25s;white-space:nowrap;backdrop-filter:blur(8px)}.think-btn:hover{border-color:rgba(16,185,129,.3);color:#a7f3d0;box-shadow:0 0 14px rgba(16,185,129,.06)}.think-btn.active{background:linear-gradient(135deg,#047857,var(--green));border-color:var(--green);color:#fff;box-shadow:0 2px 18px rgba(16,185,129,.25)}
.icon-btn{min-width:38px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);background:rgba(8,11,24,.3);color:var(--text3);cursor:pointer;font-size:14px;padding:0 12px;transition:.2s;flex-shrink:0;backdrop-filter:blur(8px)}.icon-btn:hover{background:rgba(99,102,241,.12);color:var(--text);border-color:rgba(99,102,241,.25)}
.messages{flex:1;overflow-y:auto;padding:24px 20px;scroll-behavior:smooth}.messages.hide,.settings:not(.show){display:none!important}
.settings{flex:1;overflow-y:auto;padding:24px 20px;display:none}.settings.show{display:block}
.card{background:rgba(18,22,40,.5);border:1px solid rgba(99,102,241,.04);border-radius:var(--radius);padding:24px;margin-bottom:18px;max-width:720px;backdrop-filter:blur(12px);transition:border-color .3s}.card:hover{border-color:rgba(99,102,241,.08)}
.card-title{font-size:17px;font-weight:800;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(99,102,241,.05);color:var(--text2);position:relative}.card-title::after{content:'';position:absolute;bottom:-1px;left:0;width:40px;height:2px;background:linear-gradient(90deg,var(--accent),#8b5cf6);border-radius:1px}
.card label{display:block;margin:16px 0 6px;font-size:13px;font-weight:700;color:var(--text2)}
.card select,.card input{width:100%;padding:11px 16px;background:rgba(8,11,24,.4);border:1px solid rgba(99,102,241,.06);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:.2s}.card select:focus,.card input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(99,102,241,.04)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.25s}.btn:hover{transform:translateY(-1px)}
.btn-p{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.2)}.btn-p:hover{box-shadow:0 6px 24px rgba(99,102,241,.35)}
.btn-s{background:linear-gradient(135deg,#047857,var(--green));color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.2)}.btn-s:hover{box-shadow:0 6px 24px rgba(16,185,129,.35)}
.btn-d{background:linear-gradient(135deg,#b91c1c,var(--red));color:#fff;box-shadow:0 4px 16px rgba(239,68,68,.15)}
.btn-i{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.05));color:var(--text2);border:1px solid rgba(99,102,241,.08)}.btn-i:hover{background:rgba(99,102,241,.15);color:var(--text)}
.welcome{text-align:center;padding:80px 20px 60px;max-width:600px;margin:0 auto}
.welcome svg{margin-bottom:24px;width:72px;height:72px;opacity:.9}
.welcome h2{font-size:28px;margin-bottom:10px;font-weight:800;background:linear-gradient(135deg,#c4b5fd,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--text3);font-size:15px;margin-bottom:36px}
.examples{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:460px;margin:0 auto}
.example{padding:20px 18px;background:rgba(18,22,40,.5);border:1px solid rgba(99,102,241,.04);border-radius:var(--radius);cursor:pointer;font-size:13px;text-align:left;transition:.3s;color:var(--text2);position:relative;overflow:hidden}.example::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.04),rgba(139,92,246,.01));opacity:0;transition:.3s}.example:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.2);box-shadow:0 10px 32px rgba(99,102,241,.08);color:var(--text)}.example:hover::before{opacity:1}
.msg-wrap{max-width:860px;margin:0 auto 18px;animation:fadeIn .35s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--text3)}
.avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.25)}.avatar.user{background:linear-gradient(135deg,var(--accent),#8b5cf6)}.avatar.assistant{background:linear-gradient(135deg,#059669,var(--green))}
.msg{background:rgba(18,22,40,.7);border:1px solid rgba(99,102,241,.05);border-radius:var(--radius);padding:18px 22px;font-size:14px;line-height:1.8;overflow-wrap:break-word;word-break:break-word;transition:border-color .3s;backdrop-filter:blur(8px)}.msg:hover{border-color:rgba(16,185,129,.08)}.msg.user{border-left:3px solid var(--accent);background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(139,92,246,.03))}.msg:not(.user){border-left:3px solid var(--green)}
.msg-wrap.streaming .msg{border-color:rgba(139,92,246,.18);box-shadow:0 0 24px rgba(139,92,246,.06);animation:pulseGlow 2.5s ease-in-out infinite}@keyframes pulseGlow{50%{box-shadow:0 0 30px rgba(139,92,246,.1)}}.msg-wrap.streaming .msg::after{content:'▊';color:var(--accent2);animation:blink 1s step-end infinite;margin-left:2px}@keyframes blink{50%{opacity:0}}
.step{max-width:860px;margin:0 auto 6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-family:monospace;border-left:3px solid;backdrop-filter:blur(6px)}.step.thinking{background:rgba(99,102,241,.04);border-color:var(--accent);color:#a5b4fc;animation:pulse 2.5s ease-in-out infinite}@keyframes pulse{50%{border-color:rgba(99,102,241,.4)}}.step.tool_call{background:rgba(245,158,11,.03);border-color:var(--gold);color:#fbbf24}.step.tool_result{background:rgba(16,185,129,.03);border-color:var(--green);color:#34d399}.step.reasoning{background:rgba(168,85,247,.03);border-color:#a855f7;color:#c084fc}
.st-title{font-weight:800;margin-bottom:4px;font-size:12px;text-transform:uppercase}.st-body{opacity:.8;white-space:pre-wrap;max-height:200px;overflow-y:auto;font-size:12px}
.msg pre{position:relative;background:#060910;border:1px solid rgba(99,102,241,.08);border-radius:var(--radius-sm);padding:18px;overflow-x:auto;font-size:13px;line-height:1.7;margin:12px 0;box-shadow:inset 0 2px 6px rgba(0,0,0,.4)}.msg pre::before{content:'';display:block;position:absolute;top:0;left:0;right:0;height:28px;background:rgba(99,102,241,.04);border-radius:var(--radius-sm) var(--radius-sm) 0 0;border-bottom:1px solid rgba(99,102,241,.05)}
.code-actions{position:absolute;top:5px;right:10px;z-index:1;display:flex;gap:4px}.code-actions button{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);border-radius:4px;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 8px;font-weight:600;transition:.2s}.code-actions button:hover{background:rgba(99,102,241,.16);color:var(--text)}.code-actions button.copied{background:rgba(16,185,129,.12);border-color:var(--green);color:#34d399}
.msg code{font-family:'JetBrains Mono',monospace;font-size:.88em}.msg :not(pre)>code{background:rgba(99,102,241,.08);padding:2px 7px;border-radius:4px;color:var(--accent2);border:1px solid rgba(99,102,241,.06)}
.msg h1,.msg h2,.msg h3,.msg h4{font-weight:800;margin:20px 0 8px}.msg h1{font-size:1.4em;background:linear-gradient(135deg,#a5b4fc,#c4b5fd,#e9d5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.msg h2{font-size:1.2em;color:var(--text2)}.msg h3{font-size:1.1em}
.msg blockquote{border-left:3px solid var(--accent2);padding-left:14px;color:var(--text2);margin:10px 0;font-style:italic;background:rgba(99,102,241,.02);padding:10px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.msg a{color:var(--accent2);font-weight:600}.msg table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid rgba(99,102,241,.05)}.msg td,.msg th{padding:10px 14px;border:1px solid rgba(99,102,241,.03);text-align:left}.msg th{background:rgba(99,102,241,.04);font-weight:800;font-size:12px;text-transform:uppercase;color:var(--accent2)}.msg ol,.msg ul{padding-left:24px;margin:8px 0}.msg li{margin:4px 0}.msg strong{color:var(--text);font-weight:800}
.input-area{padding:14px 20px 18px;flex-shrink:0;background:rgba(8,11,24,.7);border-top:1px solid rgba(99,102,241,.05);backdrop-filter:blur(24px)}.input-area::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.15),rgba(139,92,246,.15),transparent)}
.input-wrap{display:flex;gap:10px;align-items:center;max-width:860px;margin:0 auto}
#input{flex:1;background:rgba(8,11,24,.6);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:13px 18px;color:var(--text);font-size:14px;line-height:1.5;outline:none;min-height:50px;resize:none;transition:.3s}#input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,.06),0 0 20px rgba(99,102,241,.04)}
#send-btn{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:var(--radius);padding:13px 28px;cursor:pointer;font-size:14px;font-weight:800;white-space:nowrap;transition:.25s;box-shadow:0 2px 18px rgba(99,102,241,.25)}#send-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(99,102,241,.4)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;backdrop-filter:blur(6px)}.overlay.show{display:block}
.banner{max-width:860px;margin:0 auto 12px;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;text-align:center;font-weight:600;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);color:#fbbf24;backdrop-filter:blur(8px)}
.wiz-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);align-items:center;justify-content:center;backdrop-filter:blur(12px)}.wiz-overlay.show{display:flex}

.wiz-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px}.wiz-dots .dot{width:10px;height:10px;border-radius:50%;background:rgba(99,102,241,.1);transition:.3s}.wiz-dots .dot.active{background:var(--accent);box-shadow:0 0 10px rgba(99,102,241,.3)}.wiz-dots .dot.done{background:var(--green)}.wiz-step{display:none}.wiz-step.active{display:block}

      <h2 data-i18n="welcomeTitle">欢迎使用 PyClaw</h2>
      <p data-i18n="welcomeSub">从零构建的 AI 助手框架 — 代码执行 · 文件操作 · 智能对话</p>

        <div class="example" data-i18n="ex1P" data-prompt="列出当前目录的文件">📁 列出当前目录的文件</div>
        <div class="example" data-i18n="ex2P" data-prompt="读取 README.md 文件">📄 读取 README.md 文件</div>

        <div class="example" data-i18n="ex4P" data-prompt="现在北京时间几点了">⏰ 现在北京时间几点了</div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings" id="setPanel">
    <div class="card">
      <div class="card-title" data-i18n="sesManage">🧹 对话管理</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:12px"><span data-i18n="sesID">会话 ID:</span> <code style="color:var(--accent)" id="sidDisp">-</code></div>

        <option value="other">🌐 其他供应商</option>

      <div id="modelSelBlock"><label data-i18n="model">模型:</label>
        <select id="modelSel">
          <option value="ark-code-latest">火山引擎 Ark Code</option>
          <option value="doubao-seed-code-preview-251028">Doubao Seed Code</option>
          <option value="kimi-k2-5-260127">Kimi K2.5</option>
          <option value="glm-4-7-251222">GLM 4.7</option>
          <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
          <option value="deepseek-reasoner">DeepSeek V4 Pro</option>
        </select>

      <div id="modelInpBlock" style="display:none"><label data-i18n="model">模型名称:</label><input type="text" id="modelInp" placeholder="输入模型名称"></div>
      <label data-i18n="apiKey">API Key</label>
      <input type="password" id="apiKeyInp" placeholder="sk-...">
      <label data-i18n="endpoint">Endpoint:</label>
      <input type="text" id="epInp" placeholder="https://api.deepseek.com/v1">
      <div class="hint">完整 Base URL</div>
      <label data-i18n="maxRounds">最大思考轮数:</label>
      <input type="number" id="maxRds" min="10" max="999" value="300" style="width:130px">
      <div style="margin-top:16px">
        <button class="btn btn-i" id="btnDiag" data-i18n="runDiag">运行诊断</button>
        <button class="btn btn-s" id="btnExport" style="margin-left:8px" data-i18n="export">导出历史</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area" id="inpArea">
    <div class="input-tools">
      <div class="seg">
        <button class="seg-btn active" id="segTalk" data-full="💬 Talk" data-short="💬">💬 Talk</button>
        <button class="seg-btn" id="segCode" data-full="💻 Code" data-short="💻">💻 Code</button>
      </div>
      <button class="think-btn" id="thinkBtn" data-full="🧠 深度思考" data-short="🧠">🧠 深度思考</button>
    </div>
    <div class="input-wrap">
      <input type="text" id="input" placeholder="输入消息..." data-i18n-ph="inputPH" autocomplete="off">
      <button id="send-btn" data-i18n="send">发送</button>
    </div>
  </div>
</div>

<!-- Wizard -->
<div class="wiz-overlay" id="wizOvl">
  <div class="wiz-box">
    <div class="wiz-dots"><div class="dot active" id="wizDot1"></div><div class="dot" id="wizDot2"></div></div>
    <div class="wiz-step active" id="wizS1">

          <option value="ark-code-latest">火山引擎 Ark Code（推荐）</option>
          <option value="doubao-seed-code-preview-251028">Doubao Seed Code</option>
          <option value="kimi-k2-5-260127">Kimi K2.5</option>
          <option value="glm-4-7-251222">GLM 4.7</option>

          <option value="deepseek-reasoner">DeepSeek V4 Pro</option>

      </div>
      <div id="wizModelInp" style="display:none"><label>模型名称:</label><input type="text" id="wizModelTxt" placeholder="输入模型名称"></div>
      <button class="btn btn-p" id="wizDone" style="width:100%;justify-content:center;padding:14px;font-size:15px">✅ 开始对话</button>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
// ── STORAGE ──
var ST={_m:{}};
ST.get=function(k){if(this._m[k]!==undefined)return this._m[k];try{return localStorage.getItem(k)}catch(e){return null}};
ST.set=function(k,v){this._m[k]=v;try{localStorage.setItem(k,v)}catch(e){}};
ST.del=function(k){delete this._m[k];try{localStorage.removeItem(k)}catch(e){}};
ST.keys=function(){try{return Object.keys(localStorage)}catch(e){return Object.keys(this._m)}};
function $(id){return document.getElementById(id)}
function Escape(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
// ── I18N ──
var L={
zh:{langBtn:'🌐 EN',headerChat:'PyClaw Chat',headerSet:'⚙️ 设置',
  welcomeTitle:'欢迎使用 PyClaw',welcomeSub:'从零构建的 AI 助手框架 — 代码执行 · 文件操作 · 智能对话',
  inputPH:'输入消息...',send:'发送',think:'深度思考',user:'你',ai:'PyClaw AI',
  delConfirm:'确定删除此会话？',delAllConfirm:'确定删除所有会话？',
  noSes:'暂无会话',msgs:'条消息',cur:'当前',
  discReconnecting:'⚠️ 连接断开，正在重连...',discFailed:'❌ 无法连接服务器，请刷新。',
  reconnecting:'🔄 正在重连，请稍后...',
  navChat:'💬 聊天',navSet:'⚙️ 设置',sesTitle:'会话列表',toolsTitle:'可用工具',
  sesManage:'🧹 对话管理',sesID:'会话 ID:',newSes:'➕ 开启新会话',clearAll:'🗑️ 删除所有会话',
  modelSet:'🔧 模型设置',provider:'供应商:',model:'模型:',apiKey:'API Key',endpoint:'Endpoint:',
  maxRounds:'最大思考轮数:',diag:'🔍 环境诊断',runDiag:'运行诊断',export:'导出历史',
  storage:'📦 localStorage:',ws:'🔌 WebSocket:',browser:'🌐 浏览器:',sessions:'📋 会话:',
  ex1P:'列出当前目录的文件',ex2P:'读取 README.md 文件',ex3P:'执行 pwd 命令查看路径',ex4P:'现在北京时间几点了',
  copy:'📋 复制',copied:'✅ 已复制',themeTip:'切换主题',
  rename:'重命名',del:'删除',more:'更多操作',
},
en:{langBtn:'🌐 中文',headerChat:'PyClaw Chat',headerSet:'⚙️ Settings',
  welcomeTitle:'Welcome to PyClaw',welcomeSub:'AI assistant — code execution · file ops · intelligent chat',
  inputPH:'Type a message...',send:'Send',think:'Deep Think',user:'You',ai:'PyClaw AI',
  delConfirm:'Delete this session?',delAllConfirm:'Delete all sessions?',
  noSes:'No sessions',msgs:'msgs',cur:'Current',
  discReconnecting:'⚠️ Connection lost, reconnecting...',discFailed:'❌ Cannot connect. Please refresh.',
  reconnecting:'🔄 Reconnecting, please wait...',
  navChat:'💬 Chat',navSet:'⚙️ Settings',sesTitle:'Sessions',toolsTitle:'Tools',
  sesManage:'🧹 Sessions',sesID:'Session ID:',newSes:'➕ New Session',clearAll:'🗑️ Clear All',
  modelSet:'🔧 Model',provider:'Provider:',model:'Model:',apiKey:'API Key',endpoint:'Endpoint:',
  maxRounds:'Max Thinking Rounds:',diag:'🔍 Diagnostics',runDiag:'Run Diagnostics',export:'Export',
  storage:'📦 Storage:',ws:'🔌 WebSocket:',browser:'🌐 Browser:',sessions:'📋 Sessions:',
  ex1P:'List files in current directory',ex2P:'Read README.md file',ex3P:'Run pwd command',ex4P:'What time is it in Beijing?',
  copy:'📋 Copy',copied:'✅ Copied',themeTip:'Toggle theme',
  rename:'Rename',del:'Delete',more:'More',
}};
var lang=ST.get('pyclaw_lang')||'zh';
function t(k){return (L[lang]||L.zh)[k]||k}
// ── STATE ──
var currentMode=ST.get('pyclaw_mode')||'talk';
var thinkingOn=ST.get('pyclaw_thinking')==='true';
var sid=ST.get('pyclaw_session_id');if(!sid){sid='web_'+Math.random().toString(36).slice(2,10);ST.set('pyclaw_session_id',sid)}
var ws=null,wsRetry=0,WS_MAX=20;
var streamWrap=null,streamStm=null,thinkingEl=null,reasonRound=0;
var msgEl=$('msgArea'),finalDone=false;
var SCROLL_PENDING=false;
var ASVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" style="width:16px;height:16px"><path d="M60 10 C30 10 15 35 15 55 C15 75 30 95 45 100 L45 110 L55 110 L55 100 L60 102 L60 10 Z" fill="#3776AB"/><path d="M60 10 C90 10 105 35 105 55 C105 75 90 95 75 100 L75 110 L65 110 L65 100 L60 102 L60 10 Z" fill="#FFD43B"/><path d="M20 45 C5 40 0 50 5 60 C10 70 20 65 25 55 C28 48 25 45 20 45Z" fill="#3776AB"/><path d="M100 45 C115 40 120 50 115 60 C110 70 100 65 95 55 C92 48 95 45 100 45Z" fill="#FFD43B"/><path d="M45 15 Q35 5 30 8" stroke="#3776AB" stroke-width="3" stroke-linecap="round"/><path d="M75 15 Q85 5 90 8" stroke="#FFD43B" stroke-width="3" stroke-linecap="round"/><circle cx="45" cy="35" r="6" fill="#0d1117"/><circle cx="75" cy="35" r="6" fill="#0d1117"/><circle cx="43" cy="33" r="3" fill="#73d2ff"/><circle cx="73" cy="33" r="3" fill="#73d2ff"/></svg>';
var CACHED_INNER_W=window.innerWidth;window.addEventListener('resize',function(){CACHED_INNER_W=window.innerWidth});
function scrollDown(){if(!SCROLL_PENDING){SCROLL_PENDING=true;requestAnimationFrame(function(){SCROLL_PENDING=false;msgEl.scrollTop=msgEl.scrollHeight})}}

// ── UI Helpers ──
function applyModeUI(m){var t=$('segTalk'),c=$('segCode');if(t)t.classList.toggle('active',m==='talk');if(c)c.classList.toggle('active',m==='coding')}
function setMode(m){currentMode=m;ST.set('pyclaw_mode',m);applyModeUI(m);if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'set_mode',mode:m}))}
function applyThinkUI(){var b=$('thinkBtn');if(!b)return;b.classList.toggle('active',thinkingOn);var narrow=window.innerWidth<=1050;b.textContent=narrow?b.getAttribute('data-short'):('🧠 '+t('think'))}
function toggleThink(){thinkingOn=!thinkingOn;ST.set('pyclaw_thinking',thinkingOn);applyThinkUI();if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'set_thinking',enabled:thinkingOn,effort:'high'}))}
function toggleTheme(){var cur=document.documentElement.getAttribute('data-theme');var next=cur==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',next);$('themeBtn').textContent=next==='light'?'☀️':'🌙';ST.set('pyclaw_theme',next)}
function applyTheme(){var t=ST.get('pyclaw_theme')||'dark';document.documentElement.setAttribute('data-theme',t);$('themeBtn').textContent=t==='light'?'☀️':'🌙'}
function switchTab(tab){var items=document.querySelectorAll('.nav-tab');for(var i=0;i<items.length;i++)items[i].classList.remove('active');var nav=document.querySelector('[data-tab="'+tab+'"]');if(nav)nav.classList.add('active');var isChat=tab==='chat';var h=$('htitle');h.childNodes[h.childNodes.length-1].textContent=isChat?t('headerChat'):t('headerSet');$('msgArea').classList.toggle('hide',!isChat);$('inpArea').style.display=isChat?'':'none';$('setPanel').classList.toggle('show',!isChat)}
function openSbar(){$('sbar').classList.add('open');$('ovl').classList.add('show')}
function closeSbar(){$('sbar').classList.remove('open');$('ovl').classList.remove('show')}

// ── Messages ──
function saveMsg(type,content,extra){try{var h=JSON.parse(ST.get('pyclaw_history_'+sid)||'[]');h.push({type:type,content:content,extra:extra||'',time:Date.now()});ST.set('pyclaw_history_'+sid,JSON.stringify(h))}catch(e){}}
function mkAvatar(isU){return '<span class="avatar '+(isU?'user':'assistant')+'">'+(isU?'👤':ASVG)+'</span>'}
function addMsgDOM(content,isUser,saving){var d=document.createElement('div');d.className='msg-wrap';d.innerHTML='<div class="msg-header">'+mkAvatar(isUser)+(isUser?t('user'):t('ai'))+'</div><div class="msg'+(isUser?' user':'')+'">'+renderMD(content)+'</div>';msgEl.appendChild(d);scrollDown();if(saving!==false)saveMsg(isUser?'user':'assistant',content)}
function addStepDOM(type,label,content,saving){var d=document.createElement('div');d.className='step '+type;d.innerHTML='<div class="st-title">'+label+'</div><div class="st-body">'+Escape(content)+'</div>';msgEl.appendChild(d);scrollDown();if(saving!==false)saveMsg(type,label,content)}
function addMsg(content,isUser){addMsgDOM(content,isUser,true)}
function addStep(type,label,content){addStepDOM(type,label,content,true)}

// ── Markdown ──
function renderMD(raw){var s=String(raw||'');var dets=[];s=s.replace(/<details>([\s\S]*?)<\/details>/g,function(_,d){dets.push('<details>'+d+'</details>');return 'ʻD'+(dets.length-1)+'ʻ'});s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;');var cbs=[];s=s.replace(/```([\s\S]*?)```/g,function(_,c){cbs.push(c);return 'ʻB'+(cbs.length-1)+'ʻ'});var ics=[];s=s.replace(/`([^`]+)`/g,function(_,c){ics.push(Escape(c));return 'ʻI'+(ics.length-1)+'ʻ'});s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');s=s.replace(/~~([^~]+)~~/g,'<s>$1</s>');s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');s=s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');s=s.replace(/^## (.+)$/gm,'<h2>$1</h2>');s=s.replace(/^# (.+)$/gm,'<h1>$1</h1>');s=s.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');s=s.replace(/(^\|.+\|\n\|[-| ]+\|\n((^\|.+\|\n?)+))/gm,function(m){var rows=m.trim().split('\n').filter(function(r){return r.charAt(0)==='|'&&r.charAt(r.length-1)==='|'});if(rows.length<2)return m;var hdr=rows[0].split('|').filter(function(c){return c.trim()}).map(function(c){return '<th>'+c.trim()+'</th>'}).join('');var body='';for(var i=2;i<rows.length;i++)body+='<tr>'+rows[i].split('|').filter(function(c){return c.trim()}).map(function(c){return '<td>'+c.trim()+'</td>'}).join('')+'</tr>';return '<table><thead><tr>'+hdr+'</tr></thead><tbody>'+body+'</tbody></table>'});for(var i=0;i<ics.length;i++)s=s.replace('ʻI'+i+'ʻ','<code>'+ics[i]+'</code>');for(var i=0;i<cbs.length;i++)s=s.replace('ʻB'+i+'ʻ','<pre><div class="code-actions"><button data-action="copy">📋</button></div><code>'+cbs[i]+'</code></pre>');for(var i=0;i<dets.length;i++)s=s.replace('ʻD'+i+'ʻ',dets[i]);if(typeof katex!=='undefined'){var _M=new RegExp('[\\\\\\^_{}]|frac|sum|int|prod|lim|sqrt|sin|cos|tan|log|ln|alpha|beta|gamma|delta|epsilon|theta|pi|sigma|omega|infty|nabla|partial|cdot|times|pm|leq|geq|approx|rightarrow');s=s.replace(/\$\$([\s\S]*?)\$\$/g,function(_,f){if(_M.test(f)){try{return katex.renderToString(f.trim(),{displayMode:true,throwOnError:false})}catch(e){}}return _});s=s.replace(/\$([^$\n]+?)\$/g,function(_,f){if(_M.test(f)){try{return katex.renderToString(f.trim(),{displayMode:false,throwOnError:false})}catch(e){}}return _})}return s}

// ── Restore ──
function restoreHistory(){var h;try{h=JSON.parse(ST.get('pyclaw_history_'+sid)||'[]')}catch(e){h=[]}if(!h.length)return;msgEl.innerHTML='';for(var i=0;i<h.length;i++){var m=h[i];if(m.type==='user')addMsgDOM(m.content,true,false);else if(m.type==='assistant')addMsgDOM(m.content,false,false);else if(m.type==='thinking'||m.type==='tool_call'||m.type==='tool_result')addStepDOM(m.type,m.extra||'',m.content||'',false)}}

// ── WebSocket ──
function connectWS(){if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;var proto=location.protocol==='https:'?'wss:':'ws:';try{ws=new WebSocket(proto+'//'+location.host+'/ws')}catch(e){ws=null;scheduleRetry();return}saveSession(sid);
ws.onopen=function(){wsRetry=0;try{$('sidDisp').textContent=sid}catch(e){}var d=document.querySelector('.banner');if(d)d.remove();restoreHistory();renderSessions();syncConfig();setMode(currentMode);if(thinkingOn)ws.send(JSON.stringify({type:'set_thinking',enabled:true,effort:'high'}));var r=parseInt(ST.get('pyclaw_max_rounds'));if(r>=10)ws.send(JSON.stringify({type:'set_config',max_rounds:r}))};
ws.onmessage=function(e){try{var d=JSON.parse(e.data)}catch(ex){return}
if(d.type==='tools_list'){
    // 渲染原生工具
    const nativeList = document.getElementById('native-tools-list');
    const emojis = {'read_file':'📄','list_directory':'📁','exec_command':'💻','get_current_time':'⏰','web_search':'🌐'};
    nativeList.innerHTML = d.native.map(t => 
        '<div class="tool-item">' + (emojis[t] || '🔧') + ' ' + t.replace(/_/g,' ') + '</div>'
    ).join('');
    
    // 渲染Skill工具
    const skillSection = document.getElementById('skill-tools-section');
    const skillList = document.getElementById('skill-tools-list');
    if (d.skills && d.skills.length > 0) {
        skillSection.style.display = '';
        skillList.innerHTML = d.skills.map(t => 
            '<div class="tool-item">📦 ' + t.replace(/_/g,' ') + '</div>'
        ).join('');
    }
}
else if(d.type==='thinking'){if(!thinkingEl){thinkingEl=document.createElement('div');thinkingEl.className='step thinking';thinkingEl.innerHTML='<div class="st-title">🤔 </div>';msgEl.appendChild(thinkingEl);saveMsg('thinking','',d.content)}var tt=thinkingEl.querySelector('.st-title');if(tt)tt.textContent='🤔 '+d.content;scrollDown()}
else if(d.type==='reasoning'){var rb=$('reasonBlock');if(rb&&rb._round!==reasonRound){rb.remove();rb=null}if(!rb){rb=document.createElement('div');rb.id='reasonBlock';rb.className='step reasoning';rb._round=reasonRound;rb.innerHTML='<details open><summary class="st-title" style="cursor:pointer;user-select:none">🧠 思考过程</summary><div id="reasonText" class="st-body"></div></details>';msgEl.appendChild(rb)}var rt=$('reasonText');if(rt)rt.textContent+=d.content;scrollDown()}
else if(d.type==='tool_call'){if(thinkingEl){thinkingEl.remove();thinkingEl=null}var rb2=$('reasonBlock');if(rb2){var det=rb2.querySelector('details');if(det)det.open=false}endStream(true);addStep('tool_call','🔧 工具调用: '+Escape(d.tool),d.params||'')}
else if(d.type==='tool_result'){addStep('tool_result','✅ 工具结果: '+Escape(d.tool),d.content||'')}
else if(d.type==='stream'){if(thinkingEl){thinkingEl.remove();thinkingEl=null}var rb3=$('reasonBlock');if(rb3){var det2=rb3.querySelector('details');if(det2)det2.open=false}if(!streamWrap||!streamWrap.parentNode){finalDone=false;streamWrap=document.createElement('div');streamWrap.className='msg-wrap streaming';streamWrap.innerHTML='<div class="msg-header">'+mkAvatar(false)+t('ai')+'</div><div class="msg streaming-msg">'+d.content+'</div>';msgEl.appendChild(streamWrap);streamStm=streamWrap.querySelector('.streaming-msg')}else{if(streamStm)streamStm.textContent=d.content}scrollDown()}
else if(d.type==='session_name'){if(d.name&&d.name.trim()){ST.set('pyclaw_session_name_'+sid,d.name.trim());try{renderSessions()}catch(e){}}}
else if(d.type==='final'){if(finalDone)return;finalDone=true;if(streamWrap&&streamWrap.parentNode){var ft=streamStm?streamStm.textContent:'';streamWrap.remove();streamWrap=null;streamStm=null;if(ft&&ft.trim())addMsg(ft,false);else if(d.content)addMsg(d.content,false)}else{if(thinkingEl){thinkingEl.remove();thinkingEl=null}addMsg(d.content,false)}}};
ws.onclose=function(){ws=null;if(wsRetry<WS_MAX){wsRetry++;var txt=t('discReconnecting')+' ('+wsRetry+'/'+WS_MAX+')';var disc=document.querySelector('.banner');if(!disc){disc=document.createElement('div');disc.className='banner';disc.textContent=txt;msgEl.insertBefore(disc,msgEl.firstChild)}else disc.textContent=txt;scheduleRetry()}else{try{addMsg(t('discFailed'),false)}catch(e){}}};
ws.onerror=function(){}}
function scheduleRetry(){setTimeout(connectWS,Math.min(1000*Math.pow(1.5,Math.max(0,wsRetry-1)),10000))}
function endStream(saveContent){if(streamWrap&&streamWrap.parentNode){var c=streamStm&&streamStm.textContent.trim();if(saveContent&&c){saveMsg('assistant',streamStm.textContent);addMsgDOM(streamStm.textContent,false,false)}streamWrap.remove();streamWrap=null;streamStm=null}}
function syncConfig(){var prov=ST.get('pyclaw_provider'),model=ST.get('pyclaw_model'),ep=ST.get('pyclaw_endpoint'),key=ST.get('pyclaw_api_key');var p={type:'set_config'};if(prov)p.provider=prov;if(model)p.model=model;if(ep)p.base_url=ep;if(key)p.api_key=key;if(ws&&ws.readyState===WebSocket.OPEN&&Object.keys(p).length>1)ws.send(JSON.stringify(p))}

// ── Send ──
function sendMsg(){var txt=$('input').value.trim();if(!txt)return;if(!ws||ws.readyState!==WebSocket.OPEN){wsRetry=0;connectWS();try{addMsg(t('reconnecting'),false)}catch(e){}return}addMsg(txt,true);finalDone=false;reasonRound++;$('input').value='';if(!ST.get('pyclaw_session_name_'+sid)){ST.set('pyclaw_session_name_'+sid,txt.replace(/[?？!！。，,\.\s]+$/,'').substring(0,30));try{renderSessions()}catch(e){}}var wc=$('welcomeEl');if(wc)wc.style.display='none';ws.send(JSON.stringify({content:txt,session_id:sid}))}

// ── Sessions ──
function saveSession(id){try{var s=JSON.parse(ST.get('pyclaw_sessions')||'[]');if(s.indexOf(id)===-1){s.unshift(id);ST.set('pyclaw_sessions',JSON.stringify(s))}}catch(e){}}
function getSessionName(s){var n=ST.get('pyclaw_session_name_'+s);return n||s.substring(0,10)}
function renameSession(ts){var cur=getSessionName(ts);var nm=prompt(lang==='zh'?'重命名会话:':'Rename:',cur);if(nm&&nm.trim()&&nm.trim()!==cur){ST.set('pyclaw_session_name_'+ts,nm.trim());renderSessions()}}
function renderSessions(){var c=$('sesList');if(!c)return;try{var ss=JSON.parse(ST.get('pyclaw_sessions')||'[]');c.innerHTML='';if(!ss.length){c.innerHTML='<div style="color:var(--text3);font-size:11px;padding:4px">'+t('noSes')+'</div>';return}for(var i=0;i<ss.length;i++){var s=ss[i],h=[];try{h=JSON.parse(ST.get('pyclaw_history_'+s)||'[]')}catch(e){}var cnt=0,last='';for(var j=0;j<h.length;j++){if(h[j].type==='user'||h[j].type==='assistant')cnt++;if(h[j].time)last=h[j].time}var isCur=s===sid,timeStr='';if(last){var dt=new Date(last);timeStr=dt.toLocaleDateString()}var d=document.createElement('div');d.className='ses-item'+(isCur?' current':'');d.dataset.sid=s;d.innerHTML='<span class="ses-name">'+Escape(getSessionName(s))+'</span><div class="ses-meta"><span>'+cnt+' '+t('msgs')+'</span>'+timeStr+''+(isCur?'<span class="ses-badge">● '+t('cur')+'</span>':'')+'</div><button class="ses-menu" data-action="menu">⋮</button>';c.appendChild(d)}}catch(e){c.innerHTML='<div style="color:var(--red);font-size:11px">加载失败</div>'}}
function deleteSession(ts){if(!confirm(t('delConfirm')))return;try{ST.del('pyclaw_session_name_'+ts);ST.del('pyclaw_history_'+ts);var ss=JSON.parse(ST.get('pyclaw_sessions')||'[]');ss=ss.filter(function(s){return s!==ts});ST.set('pyclaw_sessions',JSON.stringify(ss));if(ts===sid){if(ss.length)ST.set('pyclaw_session_id',ss[0]);else{var nid='web_'+Math.random().toString(36).slice(2,10);ST.set('pyclaw_session_id',nid);saveSession(nid)}location.reload()}else renderSessions()}catch(e){console.error(e)}}
function newSession(){var nid='web_'+Math.random().toString(36).slice(2,10);saveSession(nid);ST.set('pyclaw_session_id',nid);location.reload()}
function clearAll(){if(!confirm(t('delAllConfirm')))return;try{var keys=ST.keys();for(var i=0;i<keys.length;i++){if(keys[i].indexOf('pyclaw_')===0)ST.del(keys[i])}}catch(e){}location.reload()}

// ── Settings/Diag ──
function onProvChange(){var p=$('provSel').value;$('modelSel').innerHTML='';if(p==='deepseek'){$('modelSel').innerHTML='<option value="deepseek-v4-flash">DeepSeek V4 Flash（推荐）</option><option value="deepseek-v4-pro">DeepSeek V4 Pro</option>'}else if(p==='volcengine'){$('modelSel').innerHTML='<option value="ark-code-latest">火山引擎 Ark Code（推荐）</option><option value="doubao-seed-code-preview-251028">Doubao Seed Code</option><option value="kimi-k2-5-260127">Kimi K2.5</option><option value="glm-4-7-251222">GLM 4.7</option><option value="deepseek-v4-flash">DeepSeek V4 Flash</option>'}else{$('modelSel').innerHTML='<option value="">选择或下方手动输入</option>'}var isPre=p!=='other';$('modelSelBlock').style.display=isPre?'block':'none';$('modelInpBlock').style.display=isPre?'none':'block';var ei=$('epInp');if(ei&&!ei.value)ei.value=p==='volcengine'?'https://ark.cn-beijing.volces.com/api/coding/v3':'https://api.deepseek.com/v1';saveProv()}
function saveProv(){ST.set('pyclaw_provider',$('provSel').value);sendConfig()}
function saveModel(){var m=($('provSel').value==='deepseek'||$('provSel').value==='volcengine')?$('modelSel').value:$('modelInp').value.trim();if(m)ST.set('pyclaw_model',m);sendConfig()}
function saveEp(){var ep=$('epInp').value.trim();if(ep)ST.set('pyclaw_endpoint',ep);sendConfig()}
function saveKey(){var k=$('apiKeyInp').value.trim();if(k)ST.set('pyclaw_api_key',k);sendConfig()}
function saveMaxRds(){var v=Math.max(10,Math.min(999,parseInt($('maxRds').value)||300));ST.set('pyclaw_max_rounds',v);if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'set_config',max_rounds:v}))}
var configTimer=null;
function sendConfig(){var prov=ST.get('pyclaw_provider'),model=ST.get('pyclaw_model'),ep=ST.get('pyclaw_endpoint'),key=ST.get('pyclaw_api_key');var p={type:'set_config'};if(prov)p.provider=prov;if(model)p.model=model;if(ep)p.base_url=ep;if(key)p.api_key=key;if(ws&&ws.readyState===WebSocket.OPEN&&Object.keys(p).length>1){ws.send(JSON.stringify(p));return}if(configTimer)clearInterval(configTimer);configTimer=null;configTimer=setInterval(function(){if(ws&&ws.readyState===WebSocket.OPEN){clearInterval(configTimer);configTimer=null;ws.send(JSON.stringify(p))}},500)}
function loadSaved(){try{var prov=ST.get('pyclaw_provider'),model=ST.get('pyclaw_model'),ep=ST.get('pyclaw_endpoint'),key=ST.get('pyclaw_api_key');if(prov)$('provSel').value=prov;onProvChange();if(ep)$('epInp').value=ep;if(key)$('apiKeyInp').value=key;var r=parseInt(ST.get('pyclaw_max_rounds'));if(r>=10)$('maxRds').value=r;if(prov==='deepseek'||prov==='volcengine'){var opts=$('modelSel').options,found=false;for(var i=0;i<opts.length;i++){if(opts[i].value===model){$('modelSel').value=model;found=true;break}}if(!found&&opts.length)$('modelSel').value=opts[0].value}else if(prov==='other'&&model)$('modelInp').value=model}catch(e){}}
function runDiag(){var Lbl=lang==='zh'?{ok:'✅ 正常',err:'❌',conn:'✅ 已连接',ing:'🔄 连接中',off:'❌ 断开',none:'❌ 未初始化',msgs:'条消息'}:{ok:'✅ OK',err:'❌',conn:'✅ Connected',ing:'🔄 Connecting',off:'❌ Offline',none:'❌ None',msgs:'msgs'};try{ST.set('pyclaw_test','test');ST.del('pyclaw_test');var sz=0,keys=ST.keys();for(var i=0;i<keys.length;i++){if(keys[i].indexOf('pyclaw_')===0)sz+=keys[i].length+(ST.get(keys[i])||'').length}alert(t('storage')+' '+Lbl.ok+' ('+(sz/1024).toFixed(1)+' KB)')}catch(e){alert(t('storage')+' '+Lbl.err+' '+e.message)}var wst=ws?(ws.readyState===WebSocket.OPEN?Lbl.conn:(ws.readyState===WebSocket.CONNECTING?Lbl.ing:Lbl.off)):Lbl.none;alert(t('ws')+' '+wst)}
