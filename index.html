<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PyClaw">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script async src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" onerror="this.remove()"></script>
<title>PyClaw</title>
<style>
:root{--bg:#080b16;--bg2:rgba(18,22,40,.7);--bg3:rgba(99,102,241,.08);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--gold:#f59e0b;--red:#ef4444;--border:rgba(99,102,241,.06);--radius:14px;--radius-sm:10px;--header-h:52px;--bg-sidebar:rgba(8,11,24,.92);--bg-sidebar-head:rgba(99,102,241,.05)}
.ovl{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:999;display:none;align-items:center;justify-content:center}.ovl.show{display:flex}
.ovl .wiz-box pre code{white-space:pre-wrap;word-break:break-word;font-size:12px;color:var(--text2);line-height:1.6}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;z-index:1000;opacity:0;transition:opacity .3s;pointer-events:none}#toast.show{opacity:1}
[data-theme="light"]{--bg:#f5f6fa;--bg2:rgba(255,255,255,.82);--bg3:rgba(0,0,0,.04);--text:#1a1a2e;--text2:#4a5568;--text3:#718096;--border:rgba(0,0,0,.06);--accent:#4f46e5;--accent2:#6366f1;--bg-sidebar:rgba(255,255,255,.92);--bg-sidebar-head:rgba(79,70,229,.04)}
*,*::after,*::before{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);background:var(--bg);width:100%;height:100%;overflow:hidden;display:flex}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(99,102,241,.1),transparent 55%),radial-gradient(ellipse 60% 70% at 80% 60%,rgba(139,92,246,.08),transparent 55%),radial-gradient(ellipse 50% 50% at 50% 85%,rgba(16,185,129,.08),transparent 55%),linear-gradient(180deg,#080b16 0%,#0f1335 35%,#0d0f2e 65%,#080b16 100%);animation:bgBreath 18s ease-in-out infinite}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(2px 2px at 12% 22%,rgba(99,102,241,.45),transparent),radial-gradient(2px 2px at 48% 14%,rgba(139,92,246,.35),transparent),radial-gradient(1px 1px at 72% 32%,rgba(16,185,129,.4),transparent),radial-gradient(2px 2px at 28% 62%,rgba(99,102,241,.3),transparent);background-size:220% 220%;animation:starsFloat 24s linear infinite;opacity:.5}
@keyframes bgBreath{0%,100%{opacity:1}50%{opacity:.8}}@keyframes starsFloat{0%{background-position:0 0}100%{background-position:100% 100%}}
[data-theme="light"] body::before{background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(79,70,229,.04),#f5f6fa 55%),radial-gradient(ellipse 60% 70% at 80% 60%,rgba(139,92,246,.03),#f5f6fa 55%),radial-gradient(ellipse 50% 50% at 50% 85%,rgba(16,185,129,.03),transparent 55%),linear-gradient(180deg,#f5f6fa 0%,#eef0f6 50%,#f5f6fa 100%)}
[data-theme="light"] body::after{opacity:.15}
[data-theme="light"] .sidebar-head{color:#4f46e5}
[data-theme="light"] .ses-item{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.04)}
[data-theme="light"] .ses-item.current{background:linear-gradient(135deg,rgba(79,70,229,.06),rgba(99,102,246,.03))}
[data-theme="light"] .avatar.user{background:linear-gradient(135deg,#4f46e5,#6366f1)}
[data-theme="light"] .header{background:rgba(255,255,255,.75)}
[data-theme="light"] .input-area{background:rgba(255,255,255,.7)}
[data-theme="light"] #input{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.08);color:var(--text)}
[data-theme="light"] .card{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.04)}
[data-theme="light"] .welcome h2{background:linear-gradient(135deg,#4f46e5,#6366f1,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
[data-theme="light"] .msg{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.04)}
[data-theme="light"] .msg.user{background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(99,102,246,.02))}
[data-theme="light"] .msg:not(.user){background:linear-gradient(135deg,rgba(16,185,129,.04),rgba(5,150,105,.02))}
[data-theme="light"] .msg pre{background:#f1f3f5;border-color:rgba(0,0,0,.06)}
[data-theme="light"] .example{background:rgba(255,255,255,.6)}
[data-theme="light"] .icon-btn{background:rgba(255,255,255,.6);border-color:rgba(0,0,0,.06)}
.sidebar{position:relative;z-index:2;width:268px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;z-index:100;transition:transform .35s;backdrop-filter:blur(32px)}
.sidebar-head{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:800;font-size:17px;color:var(--text-accent,#a5b4fc);background:linear-gradient(180deg,var(--bg-sidebar-head),transparent)}
.close-btn{display:none;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:6px 10px;border-radius:8px;transition:.2s}.close-btn:hover{background:rgba(99,102,241,.12);color:var(--text)}
.nav-tabs{display:flex;padding:6px 10px;gap:4px}
.nav-tab{flex:1;text-align:center;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:700;color:var(--text3);transition:.2s}
.nav-tab:hover{color:var(--text2);background:rgba(99,102,241,.06)}.nav-tab.active{background:rgba(99,102,241,.1);color:#a5b4fc;box-shadow:inset 0 0 0 1px rgba(99,102,241,.1)}
.sidebar-content{flex:1;overflow-y:auto;padding:6px 12px 16px}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:16px 4px 8px}
.ses-item{padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;position:relative;font-size:13px;transition:.25s;border:1px solid rgba(99,102,241,.04);margin-bottom:4px;background:rgba(15,20,40,.35);backdrop-filter:blur(8px)}
.ses-item::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.03),rgba(139,92,246,.01));opacity:0;transition:.3s}
.ses-item:hover{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.15);transform:translateX(4px);box-shadow:0 4px 16px rgba(99,102,241,.06)}.ses-item:hover::before{opacity:1}
.ses-item.current{border-color:rgba(99,102,241,.2);background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.04));border-left:3px solid var(--accent2);box-shadow:0 0 20px rgba(99,102,241,.08)}
.ses-name{display:block;font-weight:700;font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:34px}
.ses-meta{display:flex;gap:8px;align-items:center;margin-top:3px;font-size:11px;color:var(--text3)}
.ses-badge{font-size:10px;font-weight:800;color:#34d399;padding:2px 6px;background:rgba(16,185,129,.1);border-radius:4px}
.ses-menu{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.1);color:var(--text3);cursor:pointer;padding:3px 8px;border-radius:6px;font-size:14px;z-index:2;transition:.2s;opacity:.4}.ses-item:hover .ses-menu{opacity:1}.ses-menu:hover{background:rgba(99,102,241,.18);color:var(--accent2);opacity:1}
.tool-item{padding:6px 10px;border-radius:6px;color:var(--text3);font-size:12px;display:flex;align-items:center;gap:8px;transition:.2s}.tool-item:hover{color:var(--text2);background:rgba(99,102,241,.03)}
.ses-dropdown{display:none;position:fixed;background:rgba(18,22,40,.98);border:1px solid rgba(99,102,241,.15);border-radius:var(--radius-sm);padding:4px;min-width:120px;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.5);backdrop-filter:blur(16px)}.ses-dropdown.show{display:block}
.ses-dropdown button{display:block;width:100%;padding:8px 14px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;text-align:left;border-radius:6px;transition:.15s}.ses-dropdown button:hover{background:rgba(99,102,241,.1);color:var(--text)}.ses-dropdown button.danger:hover{background:rgba(239,68,68,.1);color:var(--red)}
.main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-width:0;height:100vh}
.header{display:flex;align-items:center;height:var(--header-h);padding:0 20px;border-bottom:1px solid rgba(99,102,241,.05);gap:12px;flex-shrink:0;background:rgba(8,11,24,.7);backdrop-filter:blur(24px)}
.header::after{content:'';position:absolute;bottom:-1px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.2),rgba(139,92,246,.2),transparent)}
.header-title{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;color:var(--text);flex:1;min-width:0}
.hamburger{display:none;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:6px;border-radius:8px;transition:.2s}.hamburger:hover{background:rgba(99,102,241,.08)}
.controls{display:flex;gap:8px;align-items:center;flex-shrink:0}
.input-tools{display:flex;align-items:center;gap:6px;max-width:860px;margin:0 auto 8px;padding:0 2px}
.input-tools .seg{border-color:rgba(99,102,241,.08)}
.input-tools .seg-btn{padding:4px 10px;font-size:11px}
.input-tools .think-btn{padding:4px 10px;font-size:11px}
.seg{display:flex;background:rgba(8,11,24,.4);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);overflow:hidden;backdrop-filter:blur(8px)}
.seg-btn{padding:7px 14px;font-size:12px;font-weight:700;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:.25s}.seg-btn.active{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 2px 14px rgba(99,102,241,.3)}.seg-btn:hover:not(.active){color:var(--text2)}
.think-btn{padding:7px 12px;font-size:12px;font-weight:700;border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);background:rgba(8,11,24,.3);color:var(--text3);cursor:pointer;transition:.25s;white-space:nowrap;backdrop-filter:blur(8px)}.think-btn:hover{border-color:rgba(16,185,129,.3);color:#a7f3d0;box-shadow:0 0 14px rgba(16,185,129,.06)}.think-btn.active{background:linear-gradient(135deg,#047857,var(--green));border-color:var(--green);color:#fff;box-shadow:0 2px 18px rgba(16,185,129,.25)}
.icon-btn{min-width:38px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(99,102,241,.12);border-radius:var(--radius-sm);background:rgba(8,11,24,.3);color:var(--text3);cursor:pointer;font-size:14px;padding:0 12px;transition:.2s;flex-shrink:0;backdrop-filter:blur(8px)}.icon-btn:hover{background:rgba(99,102,241,.12);color:var(--text);border-color:rgba(99,102,241,.25)}
.messages{flex:1;overflow-y:auto;padding:24px 20px;scroll-behavior:smooth}.messages.hide,.settings:not(.show){display:none!important}
.settings{flex:1;overflow-y:auto;padding:24px 20px;display:none}.settings.show{display:block}
.card{background:rgba(18,22,40,.5);border:1px solid rgba(99,102,241,.04);border-radius:var(--radius);padding:24px;margin-bottom:18px;max-width:720px;backdrop-filter:blur(12px);transition:border-color .3s}.card:hover{border-color:rgba(99,102,241,.08)}
.card-title{font-size:17px;font-weight:800;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(99,102,241,.05);color:var(--text2);position:relative}.card-title::after{content:'';position:absolute;bottom:-1px;left:0;width:40px;height:2px;background:linear-gradient(90deg,var(--accent),#8b5cf6);border-radius:1px}
.card label{display:block;margin:16px 0 6px;font-size:13px;font-weight:700;color:var(--text2)}
.card select,.card input{width:100%;padding:11px 16px;background:rgba(8,11,24,.4);border:1px solid rgba(99,102,241,.06);border-radius:var(--radius-sm);color:var(--text);font-size:14px;transition:.2s}.card select:focus,.card input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(99,102,241,.04)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 22px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.25s}.btn:hover{transform:translateY(-1px)}
.btn-p{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.2)}.btn-p:hover{box-shadow:0 6px 24px rgba(99,102,241,.35)}
.btn-s{background:linear-gradient(135deg,#047857,var(--green));color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.2)}.btn-s:hover{box-shadow:0 6px 24px rgba(16,185,129,.35)}
.btn-d{background:linear-gradient(135deg,#b91c1c,var(--red));color:#fff;box-shadow:0 4px 16px rgba(239,68,68,.15)}
.btn-i{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.05));color:var(--text2);border:1px solid rgba(99,102,241,.08)}.btn-i:hover{background:rgba(99,102,241,.15);color:var(--text)}
.welcome{text-align:center;padding:80px 20px 60px;max-width:600px;margin:0 auto}
.welcome svg{margin-bottom:24px;width:72px;height:72px;opacity:.9}
.welcome h2{font-size:28px;margin-bottom:10px;font-weight:800;background:linear-gradient(135deg,#c4b5fd,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--text3);font-size:15px;margin-bottom:36px}
.examples{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:460px;margin:0 auto}
.example{padding:20px 18px;background:rgba(18,22,40,.5);border:1px solid rgba(99,102,241,.04);border-radius:var(--radius);cursor:pointer;font-size:13px;text-align:left;transition:.3s;color:var(--text2);position:relative;overflow:hidden}.example::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.04),rgba(139,92,246,.01));opacity:0;transition:.3s}.example:hover{transform:translateY(-4px);border-color:rgba(99,102,241,.2);box-shadow:0 10px 32px rgba(99,102,241,.08);color:var(--text)}.example:hover::before{opacity:1}
.msg-wrap{max-width:860px;margin:0 auto 18px;animation:fadeIn .35s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;font-weight:700;color:var(--text3)}
.avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;box-shadow:0 3px 8px rgba(0,0,0,.25)}.avatar.user{background:linear-gradient(135deg,var(--accent),#8b5cf6)}.avatar.assistant{background:linear-gradient(135deg,#059669,var(--green))}
.msg{background:rgba(18,22,40,.7);border:1px solid rgba(99,102,241,.05);border-radius:var(--radius);padding:18px 22px;font-size:14px;line-height:1.8;overflow-wrap:break-word;word-break:break-word;transition:border-color .3s;backdrop-filter:blur(8px)}.msg:hover{border-color:rgba(16,185,129,.08)}.msg.user{border-left:3px solid var(--accent);background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(139,92,246,.03))}.msg:not(.user){border-left:3px solid var(--green)}
.msg-wrap.streaming .msg{border-color:rgba(139,92,246,.18);box-shadow:0 0 24px rgba(139,92,246,.06);animation:pulseGlow 2.5s ease-in-out infinite}@keyframes pulseGlow{50%{box-shadow:0 0 30px rgba(139,92,246,.1)}}.msg-wrap.streaming .msg::after{content:'▊';color:var(--accent2);animation:blink 1s step-end infinite;margin-left:2px}@keyframes blink{50%{opacity:0}}
.step{max-width:860px;margin:0 auto 6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:12px;font-family:monospace;border-left:3px solid;backdrop-filter:blur(6px)}.step.thinking{background:rgba(99,102,241,.04);border-color:var(--accent);color:#a5b4fc;animation:pulse 2.5s ease-in-out infinite}@keyframes pulse{50%{border-color:rgba(99,102,241,.4)}}.step.tool_call{background:rgba(245,158,11,.03);border-color:var(--gold);color:#fbbf24}.step.tool_result{background:rgba(16,185,129,.03);border-color:var(--green);color:#34d399}.step.reasoning{background:rgba(168,85,247,.03);border-color:#a855f7;color:#c084fc}
.st-title{font-weight:800;margin-bottom:4px;font-size:12px;text-transform:uppercase}.st-body{opacity:.8;white-space:pre-wrap;max-height:200px;overflow-y:auto;font-size:12px}

/* Agent 消息样式 */
.avatar.agent-exec{background:linear-gradient(135deg,#6366f1,#818cf8)}.avatar.agent-file{background:linear-gradient(135deg,#059669,#10b981)}.avatar.agent-search{background:linear-gradient(135deg,#d97706,#f59e0b)}.avatar.agent-browser{background:linear-gradient(135deg,#7c3aed,#a78bfa)}.avatar.agent-app{background:linear-gradient(135deg,#dc2626,#f87171)}
.msg-wrap.agent .msg{border-left-width:3px}.msg-wrap.agent-exec .msg{border-left-color:#6366f1}.msg-wrap.agent-file .msg{border-left-color:#10b981}.msg-wrap.agent-search .msg{border-left-color:#f59e0b}.msg-wrap.agent-browser .msg{border-left-color:#7c3aed}.msg-wrap.agent-app .msg{border-left-color:#dc2626}
.step.agent_thinking{background:rgba(99,102,241,.04);border-color:var(--accent);color:#a5b4fc}
.agent-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:800}.agent-badge.exec{background:rgba(99,102,241,.12);color:#a5b4fc}.agent-badge.file{background:rgba(16,185,129,.12);color:#34d399}.agent-badge.search{background:rgba(245,158,11,.12);color:#fbbf24}.agent-badge.browser{background:rgba(124,58,237,.12);color:#c084fc}.agent-badge.app{background:rgba(220,38,38,.12);color:#fca5a5}
.msg pre{position:relative;background:#060910;border:1px solid rgba(99,102,241,.08);border-radius:var(--radius-sm);padding:18px;overflow-x:auto;font-size:13px;line-height:1.7;margin:12px 0;box-shadow:inset 0 2px 6px rgba(0,0,0,.4)}.msg pre::before{content:'';display:block;position:absolute;top:0;left:0;right:0;height:28px;background:rgba(99,102,241,.04);border-radius:var(--radius-sm) var(--radius-sm) 0 0;border-bottom:1px solid rgba(99,102,241,.05)}
.code-actions{position:absolute;top:5px;right:10px;z-index:1;display:flex;gap:4px}.code-actions button{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);border-radius:4px;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 8px;font-weight:600;transition:.2s}.code-actions button:hover{background:rgba(99,102,241,.16);color:var(--text)}.code-actions button.copied{background:rgba(16,185,129,.12);border-color:var(--green);color:#34d399}
.msg code{font-family:'JetBrains Mono',monospace;font-size:.88em}.msg :not(pre)>code{background:rgba(99,102,241,.08);padding:2px 7px;border-radius:4px;color:var(--accent2);border:1px solid rgba(99,102,241,.06)}
.msg h1,.msg h2,.msg h3,.msg h4{font-weight:800;margin:20px 0 8px}.msg h1{font-size:1.4em;background:linear-gradient(135deg,#a5b4fc,#c4b5fd,#e9d5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.msg h2{font-size:1.2em;color:var(--text2)}.msg h3{font-size:1.1em}
.msg blockquote{border-left:3px solid var(--accent2);padding-left:14px;color:var(--text2);margin:10px 0;font-style:italic;background:rgba(99,102,241,.02);padding:10px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.msg a{color:var(--accent2);font-weight:600}.msg table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid rgba(99,102,241,.05)}.msg td,.msg th{padding:10px 14px;border:1px solid rgba(99,102,241,.03);text-align:left}.msg th{background:rgba(99,102,241,.04);font-weight:800;font-size:12px;text-transform:uppercase;color:var(--accent2)}.msg ol,.msg ul{padding-left:24px;margin:8px 0}.msg li{margin:4px 0}.msg strong{color:var(--text);font-weight:800}
.input-area{padding:14px 20px 18px;flex-shrink:0;background:rgba(8,11,24,.7);border-top:1px solid rgba(99,102,241,.05);backdrop-filter:blur(24px)}.input-area::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.15),rgba(139,92,246,.15),transparent)}
.input-wrap{display:flex;gap:10px;align-items:center;max-width:860px;margin:0 auto}
#input{flex:1;background:rgba(8,11,24,.6);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius);padding:13px 18px;color:var(--text);font-size:14px;line-height:1.5;outline:none;min-height:50px;resize:none;transition:.3s}#input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,.06),0 0 20px rgba(99,102,241,.04)}
#send-btn{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:var(--radius);padding:13px 28px;cursor:pointer;font-size:14px;font-weight:800;white-space:nowrap;transition:.25s;box-shadow:0 2px 18px rgba(99,102,241,.25)}#send-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(99,102,241,.4)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98;backdrop-filter:blur(6px)}.overlay.show{display:block}
.banner{max-width:860px;margin:0 auto 12px;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;text-align:center;font-weight:600;background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.12);color:#fbbf24;backdrop-filter:blur(8px)}
.wiz-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);align-items:center;justify-content:center;backdrop-filter:blur(12px)}.wiz-overlay.show{display:flex}
.wiz-box{background:rgba(18,22,40,.98);border:1px solid rgba(99,102,241,.08);border-radius:var(--radius);padding:40px;max-width:460px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.5);backdrop-filter:blur(24px)}.wiz-box h2{font-size:22px;margin-bottom:8px;color:var(--text)}.wiz-box p{color:var(--text2);font-size:14px;margin-bottom:24px}.wiz-box label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text2)}.wiz-box select,.wiz-box input{width:100%;padding:12px 16px;background:rgba(8,11,24,.5);border:1px solid rgba(99,102,241,.08);border-radius:var(--radius-sm);color:var(--text);font-size:14px;margin-bottom:16px}
.wiz-dots{display:flex;justify-content:center;gap:12px;margin-bottom:24px}.wiz-dots .dot{width:10px;height:10px;border-radius:50%;background:rgba(99,102,241,.1);transition:.3s}.wiz-dots .dot.active{background:var(--accent);box-shadow:0 0 10px rgba(99,102,241,.3)}.wiz-dots .dot.done{background:var(--green)}.wiz-step{display:none}.wiz-step.active{display:block}

.help{flex:1;overflow-y:auto;padding:24px 20px;display:none}.help.show{display:block}
.help-card .help-card-head{cursor:pointer;display:flex;align-items:center;padding:12px 14px;user-select:none;border-radius:var(--radius-sm);transition:.2s}
.help-card .help-card-head:hover{background:var(--bg3)}

var configTimer=null;
function sendConfig(){var prov=ST.get('pyclaw_provider'),model=ST.get('pyclaw_model'),ep=ST.get('pyclaw_endpoint'),key=ST.get('pyclaw_api_key');var p={type:'set_config'};if(prov)p.provider=prov;if(model)p.model=model;if(ep)p.base_url=ep;if(key)p.api_key=key;if(ws&&ws.readyState===WebSocket.OPEN&&Object.keys(p).length>1){ws.send(JSON.stringify(p));return}if(configTimer)clearInterval(configTimer);configTimer=null;configTimer=setInterval(function(){if(ws&&ws.readyState===WebSocket.OPEN){clearInterval(configTimer);configTimer=null;ws.send(JSON.stringify(p))}},500)}
function loadSaved(){try{var prov=ST.get('pyclaw_provider'),model=ST.get('pyclaw_model'),ep=ST.get('pyclaw_endpoint'),key=ST.get('pyclaw_api_key');if(prov)$('provSel').value=prov;onProvChange();if(ep)$('epInp').value=ep;if(key)$('apiKeyInp').value=key;var r=parseInt(ST.get('pyclaw_max_rounds'));if(r>=10)$('maxRds').value=r;if(prov==='deepseek'||prov==='volcengine'||prov==='ollama'){var opts=$('modelSel').options,found=false;for(var i=0;i<opts.length;i++){if(opts[i].value===model){$('modelSel').value=model;found=true;break}}if(!found&&opts.length)$('modelSel').value=opts[0].value}else if(prov==='other'&&model)$('modelInp').value=model}catch(e){}}
function runDiag(){var Lbl=lang==='zh'?{ok:'✅ 正常',err:'❌',conn:'✅ 已连接',ing:'🔄 连接中',off:'❌ 断开',none:'❌ 未初始化',msgs:'条消息'}:{ok:'✅ OK',err:'❌',conn:'✅ Connected',ing:'🔄 Connecting',off:'❌ Offline',none:'❌ None',msgs:'msgs'};try{ST.set('pyclaw_test','test');ST.del('pyclaw_test');var sz=0,keys=ST.keys();for(var i=0;i<keys.length;i++){if(keys[i].indexOf('pyclaw_')===0)sz+=keys[i].length+(ST.get(keys[i])||'').length}alert(t('storage')+' '+Lbl.ok+' ('+(sz/1024).toFixed(1)+' KB)')}catch(e){alert(t('storage')+' '+Lbl.err+' '+e.message)}var wst=ws?(ws.readyState===WebSocket.OPEN?Lbl.conn:(ws.readyState===WebSocket.CONNECTING?Lbl.ing:Lbl.off)):Lbl.none;alert(t('ws')+' '+wst)}
function exportHist(){var data={time:new Date().toISOString(),sessions:[]};try{var ss=JSON.parse(ST.get('pyclaw_sessions')||'[]');for(var i=0;i<ss.length;i++){var h=JSON.parse(ST.get('pyclaw_history_'+ss[i])||'[]');if(h.length)data.sessions.push({id:ss[i],messages:h})}}catch(e){}var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='pyclaw_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}

// ── Toast ──
var toastTimer=null;
function showToast(msg){var el=$('toast');if(!el)return;el.textContent=msg;el.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show')},2000)}
// ── Wizard ──
function checkWizard(){if(!ST.get('pyclaw_configured')){$('wizOvl').classList.add('show');onWizProvChange()}}
function onWizProvChange(){var p=$('wizProv').value;$('wizModel').innerHTML='';if(p==='deepseek'){$('wizModel').innerHTML='<option value="deepseek-v4-flash">'+ml('deepseek-v4-flash',1)+'</option><option value="deepseek-v4-pro">'+ml('deepseek-v4-pro',0)+'</option>'}else if(p==='volcengine'){$('wizModel').innerHTML='<option value="ark-code-latest">'+ml('ark-code-latest',1)+'</option><option value="doubao-seed-code-preview-251028">'+ml('doubao-seed-code-preview-251028',0)+'</option><option value="kimi-k2-5-260127">'+ml('kimi-k2-5-260127',0)+'</option><option value="glm-4-7-251222">'+ml('glm-4-7-251222',0)+'</option><option value="deepseek-v4-flash">'+ml('deepseek-v4-flash',0)+'</option>'}else if(p==='ollama'){$('wizModel').innerHTML='<option value="llama3">Llama 3</option><option value="llama3.1">Llama 3.1</option><option value="qwen2">Qwen 2</option><option value="qwen2.5">Qwen 2.5</option><option value="deepseek-coder-v2">DeepSeek Coder V2</option><option value="mistral">Mistral</option><option value="gemma2">Gemma 2</option>'}var isPre=p!=='other'&&p!=='ollama';var isOllama=p==='ollama';var showModelList=isPre||isOllama;$('wizModelSel').style.display=showModelList?'block':'none';$('wizModelInp').style.display=showModelList?'none':'block';$('wizEp').value=p==='volcengine'?'https://ark.cn-beijing.volces.com/api/coding/v3':p==='deepseek'?'https://api.deepseek.com/v1':p==='ollama'?'http://localhost:11434/v1':'';$('wizKeyHint').style.display=isOllama?'block':'none';$('wizKeyHint').textContent=t('wizOllamaHint');$('wizKey').disabled=isOllama}
function wizNext(){$('wizS1').classList.remove('active');$('wizS2').classList.add('active');$('wizDot1').className='dot done';$('wizDot2').className='dot active';$('provSel').value=$('wizProv').value;onProvChange()}
function wizDone(){var prov=$('wizProv').value,key=$('wizKey').value.trim(),model,ep;if(prov==='deepseek'||prov==='volcengine'){model=$('wizModel').value;ep=$('wizEp').value.trim()||(prov==='volcengine'?'https://ark.cn-beijing.volces.com/api/coding/v3':'https://api.deepseek.com/v1')}else if(prov==='ollama'){model=$('wizModel').value;ep=$('wizEp').value.trim()||'http://localhost:11434/v1'}else{model=$('wizModelTxt').value.trim();ep=$('wizEp').value.trim();if(!key){alert(t('wizApiKeyReq'));return}}ST.set('pyclaw_provider',prov);ST.set('pyclaw_model',model);ST.set('pyclaw_endpoint',ep);ST.set('pyclaw_configured','true');if(key)ST.set('pyclaw_api_key',key);$('provSel').value=prov;onProvChange();$('epInp').value=ep;if(prov==='deepseek'||prov==='volcengine'||prov==='ollama')$('modelSel').value=model;else $('modelInp').value=model;sendConfig();$('wizOvl').classList.remove('show')

var HELP_DATA={
zh:[
  {icon:'🚀',title:'快速开始',id:'getting-started',
   content:`<h3>1. 配置 API Key</h3><p>打开左侧 <b>设置</b> 面板（⚙️ 图标），选择供应商（推荐用火山引擎或 DeepSeek），填入 API Key。如果你第一次用，引导向导会自动弹出帮你配置。</p><h3>2. 选择模型</h3><p>设置面板里有模型下拉菜单。火山引擎推荐选 "Ark Code"；DeepSeek 选 "V4 Flash"。填完 API Key 后记得点一下保存。</p><h3>3. 开始对话</h3><p>回到聊天页面，在底部输入框打字，点「发送」或按 Enter。PyClaw 会理解你的需求，自动调用工具去执行。</p><h3>4. Talk vs Coding 模式</h3><p>输入框上方有两个按钮：</p><ul><li><b>💬 Talk</b> — 日常对话模式。PyClaw 会尽量用自然语言回复，适合问问题、讨论方案。</li><li><b>💻 Code</b> — 代码优先模式。PyClaw 优先思考代码实现，回复里代码占比更高。</li></ul><p>随时可以切换，不会影响当前会话历史。</p><h3>5. 会话管理</h3><p>左侧面板显示所有会话列表。当前会话有小圆点标记。你可以重命名、删除单个会话，或一键清空所有会话。会话自动保存，关闭页面不丢。</p>`},
  {icon:'🔑',title:'API 配置指南',id:'api-config',
   content:`<h3>1. 支持的供应商</h3><p>PyClaw 支持多个 AI 供应商，你可以在设置面板中切换：</p><h4>🌋 火山引擎（推荐）</h4><p>字节跳动的 AI 平台，提供 Ark Code、Doubao Seed 等模型。速度快、稳定、国内直连。去 console.volcengine.com 注册并创建 API Key 填到设置里。</p><h4>🟢 DeepSeek</h4><p>提供 V4 Flash（快速）和 V4 Pro（深度推理）两个模型。去 platform.deepseek.com 注册，创建 API Key。Endpoint 默认用 https://api.deepseek.com/v1。</p><h4>🦙 Ollama（本地）</h4><p>本地运行的开源模型，无需 API Key。安装 <a href="https://ollama.ai" target="_blank">Ollama</a> 后，拉取模型（如 <code>ollama pull qwen2.5</code>），PyClaw 会自动检测并列出可用模型。Endpoint 默认 <code>http://localhost:11434/v1</code>。</p><h4>🌐 其他供应商</h4><p>选"其他供应商"后自定义模型名称和 Base URL。兼容 OpenAI API 格式的服务都能用。</p><h3>2. API Key 安全</h3><p>API Key 存在浏览器 localStorage，不发给第三方。PyClaw 只在对话时用它调模型。随时在设置面板修改或清空。</p><h3>3. Endpoint</h3><p>API 基础地址，大部分默认就行：</p><ul><li>火山引擎：https://ark.cn-beijing.volces.com/api/coding/v3</li><li>DeepSeek：https://api.deepseek.com/v1</li><li>其他：自定义 URL</li></ul><p>填完整的 Base URL，不加 /chat/completions。</p><h3>4. 模型推荐</h3><ul><li><b>日常对话</b> → DeepSeek V4 Flash（快）</li><li><b>写代码</b> → 火山引擎 Ark Code（编码强）</li><li><b>复杂推理</b> → DeepSeek V4 Pro</li><li><b>超长上下文</b> → DeepSeek（1M token）</li></ul><h3>5. 诊断</h3><p>配置后不能用？设置 → 运行诊断检查 localStorage 和 WebSocket。不行就换供应商。</p>`},
  {icon:'🧠',title:'Agent 架构',id:'agent-arch',
   content:`<h3>1+5 架构是什么</h3><p>PyClaw 采用 <b>一个主 Agent + 多个子 Agent</b> 的协作架构，灵感来自腾讯 Marvis 设计。</p><p>主 Agent 负责理解你的需求、拆解任务、把活儿派下去。子 Agent 各管一摊，干完把结果交回来。你不需要关心内部怎么分工。</p><h3>三种架构模式</h3><ul><li><b>基础模式</b> — 只有主 Agent，没有子代理。适合纯聊天，不需要工具的场景。</li><li><b>标准模式 (1+2)</b> — 主 Agent + Exec + File。日常开发够用了，能执行命令和读写文件。</li><li><b>完整模式 (1+5)</b> — 主 Agent + Exec + File + Search + Browser + App。全功能模式，啥都能干。</li></ul><h3>delegate_to 机制</h3><p>当你用完整模式时，主 Agent 会让子 Agent 干活。比如你让它"查一下 Python 3.12 的新特性"，它会：</p><ol><li>主 Agent 决定这事该 Search 子 Agent 干</li><li>Search 子 Agent 联网搜索、抓取结果</li><li>结果返回给主 Agent，整理成回答给你</li></ol><p>这一切自动发生，你看到的就是一个流畅的对话。</p><h3>在设置面板切换</h3><p>打开设置 → Agent 架构，下拉菜单选择模式，点「应用架构」即可。切换后下次对话开始生效。</p>`},
  {icon:'🤝',title:'多 Agent 协作',id:'multi-agent',
   content:`<h3>每个子 Agent 能做什么</h3><p>完整模式下 5 个子 Agent 各司其职：</p><h4>💻 Exec（执行器）</h4><p>跑 shell 命令、编译代码、pip 安装、git 操作。适合"帮我装个 pandas"、"当前目录有哪些文件"、"运行测试用例"这类需求。</p><h4>📄 File（文件管理器）</h4><p>读写文件、查看目录结构、搜索文件内容。适合"帮我改一下 config.json"、"把日志文件读给我看看"。</p><h4>🌐 Search（搜索器）</h4><p>联网搜索 + 网页抓取。适合"查一下今天天气"、"DeepSeek 最新模型是什么"、"帮我抓取这个网页的正文"。</p><h4>🌍 Browser（浏览器）</h4><p>浏览器自动化（登录、填表单、截图）。适合"帮我登录一下 Gmail"、"截个百度首页的图"。</p><h4>📱 App（桌面操控）</h4><p>模拟桌面操作（截图分析、点按钮、打字）。适合"打开 VS Code"、"帮我截个屏幕"。</p><h3>实际例子</h3><p><b>需求：</b>"写一个 Python 脚本，统计项目里有多少行代码，然后把结果保存到 report.txt"</p><p>主 Agent 会这么分：</p><ol><li>先用 File 子 Agent 看一下目录结构</li><li>告诉 Exec 子 Agent 执行 <code>find . -name "*.py" | xargs wc -l</code></li><li>结果出来了，再让 File 子 Agent 写入 report.txt</li></ol><p>你只要说一句话，剩下的它干完了。</p>`},
  {icon:'@',title:'@mention — 直接调用',id:'at-mention',
   content:`<h3>@mention 是什么</h3><p>在输入框中用 <code>@exec</code>、<code>@file</code>、<code>@search</code>、<code>@browser</code>、<code>@app</code> 可以直接把任务交给指定子 Agent，不经过主 Agent 中转。</p><h3>示例</h3><blockquote>@exec uname -a</blockquote><blockquote>@file 读 README.md</blockquote><blockquote>@search 查一下今天天气</blockquote><h3>颜色标识</h3><ul><li><b>💻 Exec</b> — 蓝色，跑命令</li><li><b>📄 File</b> — 绿色，读文件</li><li><b>🔍 Search</b> — 橙色，搜网页</li><li><b>🌐 Browser</b> — 紫色，浏览</li><li><b>🚀 App</b> — 红色，桌面操作</li></ul><p>每个 Agent 回复有专属颜色和图标，一眼看出是谁干的。</p>`},
  {icon:'📦',title:'Skill 插件系统',id:'skills',
   content:`<h3>Skill 是什么</h3><p>Skill 是 PyClaw 的插件系统。你可以安装社区分享的 Skill，也可以自己写。每个 Skill 是一组工具函数的集合，让 PyClaw 获得新能力。</p><h3>list_skills — 查看已安装</h3><p>直接问 PyClaw"列一下装了什么 Skill"，它会调用 <code>list_skills</code> 工具。返回一个列表，包含每个 Skill 的名称、版本、描述。</p><h3>install_skill — 安装新 Skill</h3><p>告诉 PyClaw"安装一个叫 time-travel 的 Skill"，它会自动下载、解压、注册。</p><h3>uninstall_skill — 卸载</h3><p>说"把 time-travel Skill 卸了"，它就卸载干净，包括注册的工具函数。</p><h3>Skill 目录</h3><p>安装后 Skill 在工作空间的 <code>skills/</code> 目录下，每个 Skill 一个文件夹。</p>`},
  {icon:'🧠',title:'记忆系统',id:'memory',
   content:`<h3>PyClaw 的记忆分两种</h3><h4>会话记忆</h4><p>当前对话的所有消息自动保存。关闭页面再打开，历史记录还在 — 只要你用同一个会话 ID。这是最基础的「短期记忆」。</p><h4>全局记忆</h4><p>这是真正的「长期记忆」。你可以让 PyClaw 记住一些跨会话的信息，下次聊的时候它还记得。</p><h3>如何让 PyClaw 记住东西</h3><p>直接说：</p><blockquote>记住我的名字是小明</blockquote><blockquote>我喜欢用 Python 写后端</blockquote><p>PyClaw 会调用 <code>add_global_memory</code> 工具存入持久化存储。</p><h3>搜索记忆</h3><p>PyClaw 在回答你的问题时，会自动搜索相关记忆。你也可以主动问：</p><blockquote>你还记得我的名字吗？</blockquote><p>它会调用 <code>search_memory</code> 去查。记忆按相关性排序，最相关的优先呈现。</p><h3>记忆管理</h3><p>全局记忆存储在服务端，支持增删查。如果你想让 PyClaw 忘掉某条记忆，告诉它：</p><blockquote>把我叫小明这个记忆删掉</blockquote><p>它会调用对应的删除工具。</p>`},
  {icon:'📁',title:'文件与工作空间',id:'files',
   content:`<h3>工作空间（Workspace）是什么</h3><p>工作空间是 PyClaw 的项目根目录。所有文件操作都在工作空间范围内进行，不会跑到系统别的地方去。</p><h3>文件读写</h3><p>让 PyClaw 读文件：</p><blockquote>读取 README.md</blockquote><blockquote>看看 src/ 目录下有哪些文件</blockquote><p>让 PyClaw 写文件：</p><blockquote>帮我创建一个 hello.py，打印 Hello World</blockquote><h3>工作空间管理</h3><ul><li><code>workspace_add</code> — 添加项目文件</li><li><code>workspace_list</code> — 列出文件</li><li><code>workspace_files</code> — 按类型过滤</li><li><code>workspace_search</code> — 搜索内容</li></ul>`},
  {icon:'💡',title:'使用技巧',id:'tips',
   content:`<h3>1. 写好 prompt</h3><ul><li><b>具体</b> — 不说"帮我写个脚本"，说"写一个 Python 脚本遍历 .py 文件统计行数"。</li><li><b>给上下文</b> — "项目用 FastAPI + SQLite，写个注册接口"比"写个接口"好得多。</li><li><b>一步步来</b> — 先"看项目结构"，再"读 models.py"，最后"写接口"。</li></ul><h3>2. Talk vs Coding</h3><ul><li><b>💬 Talk</b> — 问问题、讨论。更自然的回复。</li><li><b>💻 Code</b> — 写代码、调试。注重代码质量。</li></ul><h3>3. 深度思考</h3><p>点 🧠 按钮，PyClaw 多推理几轮再回答。适合复杂问题，但慢一点。</p><h3>4. 小技巧</h3><ul><li><b>复制代码</b> — 代码块右上角 📋</li><li><b>切换主题</b> — 标题栏 🌙/☀️</li><li><b>导出历史</b> — 设置 → 导出历史，JSON 格式</li><li><b>诊断</b> — 设置 → 运行诊断，出问题先点这个</li></ul>`}
],
en:[
  {icon:'🚀',title:'Quick Start',id:'getting-started',
   content:`<h3>1. Configure API Key</h3><p>Open <b>Settings</b> panel (⚙️). Pick a provider (Volcengine or DeepSeek recommended), paste your API Key. First time? The setup wizard shows up automatically.</p><h3>2. Pick a Model</h3><p>Choose from the dropdown. Volcengine → "Ark Code", DeepSeek → "V4 Flash". Settings auto-save.</p><h3>3. Start Chatting</h3><p>Go to Chat, type your message, hit Send or Enter. PyClaw understands intent and calls tools as needed.</p><h3>4. Talk vs Coding Mode</h3><p>Two buttons above input:</p><ul><li><b>💬 Talk</b> — Natural conversation. Best for questions, discussion.</li><li><b>💻 Code</b> — Code-first. Prioritizes executable solutions.</li></ul><p>Switch anytime. Context preserved.</p><h3>5. Sessions</h3><p>Left panel lists all sessions. Current one has a dot. Rename, delete individual, or clear all. Auto-saved.</p>`},
  {icon:'🔑',title:'API Configuration Guide',id:'api-config',
   content:`<h3>1. Supported Providers</h3><p>PyClaw supports multiple AI providers. Switch in Settings:</p><h4>🌋 Volcengine (Recommended)</h4><p>By ByteDance. Fast, stable, domestic. Register at console.volcengine.com, create API key, paste into Settings.</p><h4>🟢 DeepSeek</h4><p>V4 Flash (fast) and V4 Pro (deep reasoning). Register at platform.deepseek.com. Default endpoint: https://api.deepseek.com/v1.</p><h4>🦙 Ollama (Local)</h4><p>Run open-source models locally. Install <a href="https://ollama.ai" target="_blank">Ollama</a>, pull a model (e.g. <code>ollama pull qwen2.5</code>), and PyClaw auto-detects it. No API key needed. Default endpoint: <code>http://localhost:11434/v1</code>.</p><h4>🌐 Custom</h4><p>Select "Other" for custom model name and Base URL. Any OpenAI-compatible API works.</p><h3>2. Safety</h3><p>API key stored in browser localStorage, never sent to third parties. Only used to call your chosen model. Change or clear anytime from Settings.</p><h3>3. Endpoint</h3><p>Base URL, defaults work for most:</p><ul><li>Volcengine: https://ark.cn-beijing.volces.com/api/coding/v3</li><li>DeepSeek: https://api.deepseek.com/v1</li><li>Custom: your URL</li></ul><p>Full Base URL only, no /chat/completions.</p><h3>4. Model Picks</h3><ul><li><b>Daily chat</b> → DeepSeek V4 Flash</li><li><b>Coding</b> → Volcengine Ark Code</li><li><b>Complex</b> → DeepSeek V4 Pro</li><li><b>Long context</b> → DeepSeek (1M tokens)</li></ul><h3>5. Troubleshooting</h3><p>Not working? Settings → Run Diagnostics checks localStorage and WebSocket. Try switching providers.</p>`},
  {icon:'🧠',title:'Agent Architecture',id:'agent-arch',
   content:`<h3>What is 1+5?</h3><p>PyClaw uses a <b>main Agent + sub-agents</b> model inspired by Tencent Marvis.</p><p>The main Agent understands your request, breaks it down, and delegates. Sub-agents handle specialized work and report back. You see one smooth conversation.</p><h3>Three Modes</h3><ul><li><b>Basic</b> — Main only, no sub-agents. Pure chat.</li><li><b>Standard (1+2)</b> — Main + Exec + File. Daily dev.</li><li><b>Full (1+5)</b> — Main + Exec + File + Search + Browser + App. Everything.</li></ul><h3>delegate_to</h3><p>In Full mode, main Agent delegates. Ask "What's new in Python 3.12?" → decides Search handles it → Search fetches → main composes answer. All automatic.</p><h3>Switch in Settings</h3><p>Settings → Agent Architecture → pick mode → Apply. Takes effect next conversation.</p>`},
  {icon:'🤝',title:'Multi-Agent Collaboration',id:'multi-agent',
   content:`<h3>What Each Sub-Agent Does</h3><h4>💻 Exec</h4><p>Shell commands, compile, pip install, git. Ask "install pandas", "run tests".</p><h4>📄 File</h4><p>Read/write files, browse directories. Ask "edit config.json".</p><h4>🌐 Search</h4><p>Web search + page fetch. Ask "what's the weather".</p><h4>🌍 Browser</h4><p>Browser automation. Ask "login to Gmail".</p><h4>📱 App</h4><p>Desktop GUI control. Ask "open VS Code".</p><h3>Example</h3><p>"Write a Python script to count code lines, save to report.txt" → File checks structure → Exec runs count → File writes result. One sentence.</p>`},
  {icon:'@',title:'@mention — Direct Call',id:'at-mention',
   content:`<h3>What is @mention</h3><p>Type <code>@exec</code>, <code>@file</code>, <code>@search</code>, <code>@browser</code>, or <code>@app</code> to directly talk to a specific sub-agent, bypassing the main Agent.</p><h3>Examples</h3><blockquote>@exec uname -a</blockquote><blockquote>@file read README.md</blockquote><blockquote>@search weather today</blockquote><h3>Color Legend</h3><ul><li><b>💻 Exec</b> — Blue, commands</li><li><b>📄 File</b> — Green, files</li><li><b>🔍 Search</b> — Orange, web</li><li><b>🌐 Browser</b> — Purple, browsing</li><li><b>🚀 App</b> — Red, desktop</li></ul><p>Each agent has its own color and icon. Easy to tell who's talking.</p>`},
  {icon:'📦',title:'Skill Plugin System',id:'skills',
   content:`<h3>Skills are Plugins</h3><p>Install community skills or write your own. Each adds tools to PyClaw.</p><h3>list_skills</h3><p>Ask "list my skills". Returns name, version, description.</p><h3>install_skill</h3><p>"Install time-travel skill" → downloads, extracts, registers.</p><h3>uninstall_skill</h3><p>"Uninstall time-travel" → removes everything.</p>`},
  {icon:'🧠',title:'Memory System',id:'memory',
   content:`<h3>Session Memory</h3><p>Messages auto-saved. Reopen page, history is there.</p><h3>Global Memory</h3><p>Long-term memory across sessions. Say "Remember my name is Alice" → PyClaw persists it.</p><h3>Search</h3><p>Ask "Do you remember my name?" → PyClaw searches and returns relevant results.</p>`},
  {icon:'📁',title:'Files & Workspace',id:'files',
   content:`<h3>Workspace</h3><p>Project root for all file operations. Safe from rest of your system.</p><h3>File Ops</h3><p>"Read README.md", "list files in src/", "create hello.py". Uses read_file, write_file.</p><h3>Workspace Tools</h3><ul><li><code>workspace_add</code> — add files</li><li><code>workspace_list</code> — list files</li><li><code>workspace_search</code> — search content</li></ul>`},
  {icon:'💡',title:'Tips & Tricks',id:'tips',
   content:`<h3>Better Prompts</h3><ul><li><b>Be specific</b> — "Count .py lines" not "write a script"</li><li><b>Give context</b> — "FastAPI + SQLite, write registration endpoint"</li><li><b>Step by step</b> — Progressively build up complex tasks</li></ul><h3>Modes</h3><ul><li><b>💬 Talk</b> — Natural responses</li><li><b>💻 Code</b> — Code quality focused</li></ul><h3>Deep Thinking</h3><p>Hit 🧠 for complex problems. Slower but smarter answers.</p><h3>Quick Tips</h3><ul><li>Copy code: 📋 button on code blocks</li><li>Theme: 🌙/☀️ in header</li><li>Export: Settings → Export</li><li>Diag: Settings → Run Diagnostics when stuck</li></ul>`}
]
};
// ── Render Help ──
function renderHelp(){
    var lang=ST.get('pyclaw_lang')||'zh';
    var data=HELP_DATA[lang]||HELP_DATA.zh;
    var el=$('helpList');
    if(!el)return;
    el.innerHTML='';
    for(var i=0;i<data.length;i++){
        var t=data[i];
        var card=document.createElement('div');
        card.className='card help-card';
        card.innerHTML='<div class="help-card-head" onclick="this.parentElement.classList.toggle(\'expanded\')">'+
            '<span style="font-size:18px;margin-right:8px">'+t.icon+'</span>'+
            '<strong>'+t.title+'</strong>'+
            '<span style="margin-left:auto;color:var(--text3);font-size:12px;transition:.3s">▸</span></div>'+
            '<div class="help-card-body">'+t.content+'</div>';
        el.appendChild(card);
    }
}

msgEl.addEventListener('click',function(e){var btn=e.target.closest('[data-action="copy"]');if(!btn)return;var code=btn.closest('pre').querySelector('code').textContent;navigator.clipboard.writeText(code).then(function(){btn.textContent='✅';btn.classList.add('copied');setTimeout(function(){btn.textContent='📋';btn.classList.remove('copied')},2000)}).catch(function(){btn.textContent='❌'})});
